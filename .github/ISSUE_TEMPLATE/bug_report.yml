name: Bug report
description: Something is not working as expected
labels: [ bug ]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps needed to reproduce the behaviour.
      placeholder: |
        1. Create a Bloc that...
        2. Call send(...)
        3. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any stack traces or Logcat output.
    validations:
      required: true

  - type: input
    id: library-version
    attributes:
      label: Library version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: kotlin-version
    attributes:
      label: Kotlin version
      placeholder: "e.g. 2.0.21"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android / API level
      placeholder: "e.g. Android 14 / API 34"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might be relevant.
    validations:
      required: false
